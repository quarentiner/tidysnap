[build]
  command = "npm run build"
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["Clutter_Cleanup_Pipeline_Prompts_Updated.md"]

[[redirects]]
  from = "/api/analyze-image"
  to = "/.netlify/functions/analyze-image"
  status = 200

[[redirects]]
  from = "/api/generate-clean-preview"
  to = "/.netlify/functions/generate-clean-preview"
  status = 200
